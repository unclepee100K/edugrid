{% extends 'base.html' %}
{% load static %}

{% block title %}Create Assignment{% endblock %}

{% block content %}
<div class="card shadow">
    <div class="card-header">
        <h4><i class="fas fa-plus-circle"></i> Create New Assignment</h4>
    </div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Subject *</label>
                        <select name="subject" class="form-select" required>
                            <option value="">Select Subject</option>
                            {% for sub in subjects %}
                                <option value="{{ sub.id }}">{{ sub.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Term *</label>
                        <select name="term" class="form-select" required>
                            <option value="{{ current_term.id }}">{{ current_term }}</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Title *</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Assignment Type *</label>
                        <select name="assignment_type" class="form-select" required>
                            <option value="">Select Type</option>
                            {% for key, label in assignment_types %}
                                <option value="{{ key }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Max Marks *</label>
                        <input type="number" name="max_marks" class="form-control" value="100" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Due Date *</label>
                        <input type="datetime-local" name="due_date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Document (optional)</label>
                        <input type="file" name="document" class="form-control" accept=".pdf,.doc,.docx,.txt">
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Create Assignment</button>
            <a href="{% url 'teacher_dashboard' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
