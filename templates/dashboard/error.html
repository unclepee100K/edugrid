{% extends 'base.html' %}

{% block title %}Error - EduGrid{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg">
                <div class="card-header bg-danger text-white">
                    <h3><i class="fas fa-exclamation-triangle"></i> Oops!</h3>
                </div>
                <div class="card-body text-center">
                    <h4>{{ message|default:"Something went wrong." }}</h4>
                    <p class="text-muted">
                        Please contact the school administration if you believe this is an error.
                    </p>
                    <a href="{% url 'admin:index' %}" class="btn btn-primary mt-3">
                        <i class="fas fa-arrow-left"></i> Go to Admin
                    </a>
                    <a href="{% url 'logout' %}" class="btn btn-outline-secondary mt-3">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
